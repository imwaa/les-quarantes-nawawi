<ion-content [fullscreen]="true">
  <div class="after-hero">
    <div class="after-hero-accent"></div>
    <div class="after-subtitle">{{ 'favorites.subtitle' | transloco }}</div>
    <div class="after-title">{{ 'favorites.title' | transloco }}<br><span>{{ 'favorites.title_accent' | transloco }}</span></div>
    <div class="after-meta">{{ 'favorites.meta' | transloco: { count: hadithList.length } }}</div>
  </div>

  <div class="after-section-label">
    <span>{{ 'favorites.section' | transloco }}</span>
  </div>

  <div class="list-container">
    <app-hadith-list [hadithList]="hadithList"></app-hadith-list>
  </div>

  @if (hadithList.length === 0) {
    <div class="empty-container">
      <p class="emptyHadith">{{ 'favorites.empty' | transloco }}</p>
    </div>
  }

</ion-content>
