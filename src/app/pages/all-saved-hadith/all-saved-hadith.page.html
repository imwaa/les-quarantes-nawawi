<ion-content [fullscreen]="true">
  <div class="after-hero">
    <div class="after-hero-accent"></div>
    <div class="after-subtitle">Ma collection</div>
    <div class="after-title">Hadiths<br><span>Favoris</span></div>
    <div class="after-meta">{{ hadithList.length }} hadiths enregistrés</div>
  </div>

  <div class="after-section-label">
    <span>Mes favoris</span>
  </div>

  <div class="list-container">
    <app-hadith-list [hadithList]="hadithList"></app-hadith-list>
  </div>

  @if (hadithList.length === 0) {
    <div class="empty-container">
      <p class="emptyHadith">Aucun hadith n'a été ajouté dans les favoris</p>
    </div>
  }

</ion-content>
